name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version component to increment"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Bump version
        run: |
          chmod +x ./version.sh
          ./version.sh "${{ github.event.inputs.bump }}"

      - name: Commit and push version bump
        run: |
          VERSION=$(cat src/VERSION)
          git add src/VERSION CHANGELOG.md README.md
          git commit -m "Bump version to $VERSION [skip ci]"
          git push
