name: CI/CD Pipeline

permissions:
  contents: write # required by the release job in the reusable workflow

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run"
        required: false
        default: "Manual trigger"

jobs:
  pipeline:
    uses: docdyhr/.github/.github/workflows/python-ci.yml@v1
    with:
      python-version: "3.13"
      apt-deps: "shellcheck clang-format build-essential bc zip"
      brew-deps: "shellcheck clang-format bc"
    secrets: inherit
